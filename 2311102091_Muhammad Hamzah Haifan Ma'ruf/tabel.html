<!DOCTYPE html>
<html>
<head>
    <title>Tabel Data Buku</title>
</head>
<body>

<center>

<h2>Daftar Buku Perpustakaan</h2>

        <th rowspan="2">Judul Buku</th>
        <th colspan="2">Kategori</th>
        <th rowspan="2">Tahun</th>
    </tr>
    <tr>
        <th>Fiksi</th>
        <th>Non Fiksi</th>
    </tr>
    <tr>
        <td>Laskar Pelangi</td>
        <td>✔</td>
        <td>-</td>
        <td>2005</td>
    </tr>
    <tr>
        <td>Atomic Habits</td>
        <td>-</td>
        <td>✔</td>
        <td>2018</td>
    </tr>
</table>

</center>

</body>
</html>
